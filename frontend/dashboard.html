<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | CourseKaro</title>
  <meta name="description" content="View courses and manage enrollments.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand">CourseKaro</div>
      <div class="nav-user">
        <span id="studentNameDisplay">Loading...</span>
        <button id="logoutBtn" class="btn btn-outline btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <main class="dashboard-container">
    <div id="dashboardAlert" class="alert hidden"></div>

    <section class="dashboard-section">
      <div class="section-header">
        <h2>Available Courses</h2>
        <p>Browse and enroll in available courses.</p>
      </div>

      <div id="coursesGrid" class="courses-grid">

        <div class="loader">Loading courses...</div>
      </div>
    </section>

    <section class="dashboard-section mt-lg">
      <div class="section-header">
        <h2>My Enrollments</h2>
        <p>Courses you are currently enrolled in.</p>
      </div>

      <div class="table-responsive">
        <table class="enrollments-table">
          <thead>
            <tr>
              <th>Course Title</th>
              <th>Instructor</th>
              <th>Schedule</th>
              <th>Credits</th>
              <th>Enrolled Date</th>
            </tr>
          </thead>
          <tbody id="enrollmentsTableBody">

            <tr>
              <td colspan="5" class="text-center">Loading enrollments...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
