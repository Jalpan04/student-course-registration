<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration | Course Registration System</title>
  <meta name="description" content="Register an account for the student course registration system.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Join to start browsing and enrolling in courses</p>
      </div>
      
      <div id="registerAlert" class="alert hidden"></div>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" autocomplete="name">
          <span class="error-message" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="student@college.edu" autocomplete="email">
          <span class="error-message" id="emailError"></span>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min 8 characters" autocomplete="new-password">
          <span class="error-message" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repeat password" autocomplete="new-password">
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="index.html">Log in here</a></p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
